# Git

[git_branch]
format = " [$symbol$branch(:$remote_branch)]($style)"
style = "purple"
symbol = "´Éÿ "

[git_commit]
format = ' [\($hash$tag\)](bold green)'
tag_disabled = false
tag_symbol = " ´ÉÆ "

[git_status]
ahead = '[Ôåæ$count](192)'
behind = '[Ôåô$count](192)'
conflicted = '[=$count](220)'
deleted = "[├ù$count](red)"
diverged = ' [ÔåòÔåæ$ahead_countÔåô$behind_count](208)'
format = " [$all_status$ahead_behind]($style)"
modified = '[!$count](172)'
renamed = "[┬╗$count](105)"
staged = "[+$count](34)"
stashed = '[\$$count](37)'
untracked = '[?$count](45)'

