# Custom
[custom.giturl]
command = '''
remote_url=$(git remote -v | awk '{print $2}')
if [ -z "$remote_url" ]; then
  exit 1
fi
case "$remote_url" in
  *github*) 
    symbol="¯£ë" ;;
  *gitlab*)
    symbol="¾░«á" ;;
  *bitbucket*)
    symbol="¯£â" ;;
  *azure*)
    symbol="¯»ÿ" ;;
  *aws*)
    symbol="¯×¡" ;;
  *gitea*)
    symbol="´î╣" ;;
# Work git repo
  *pijush*)
    symbol="¾░«á" ;;
  *repo.grameenphone*)
    symbol="¯£ë" ;;
# Catch-all
  *)
    symbol="¾░èó" ;;
esac
echo -e $symbol
'''
description = "Display symbol for remote git url"
format = "[´æá](bright-black)( $output)"
require_repo = true
shell = ["bash", "--noprofile", "--norc"]
when = true

[custom.xcode]
os = "macos"
command = '''
xcodebuild -version | awk '/Xcode/{ver=$2} /Build/{build=$3} END{print ver "(" build ")"}'
'''
description = "Displays Xcode version"
detect_files = ["Package.swift"]
format = " [$symbol]($style)( $output)"
shell = ["bash", "--noprofile", "--norc"]
style = "33"
symbol = "¯ú¿"
when = '''
results=$(find . -maxdepth 1 -type d \
  \( -name "*.xcworkspace" \
  -o -name "*.xcodeproj" \
  -o -name "*.playground" \) \
)
echo $results | grep .
'''

# Disabled
[jobs]
disabled = true

[battery]
disabled = true

[memory_usage]
disabled = true
