style_user = "yellow"

[hostname]
format = "@[$hostname]($style)"
ssh_only = true
style = "green"

[directory]
format = " [´æá](bright-black) [$path]($style)[$read_only]($read_only_style)"
read_only = " ¾░î¥ "
truncate_to_repo = false
truncation_symbol = "../"
before_repo_root_style = "bold cyan"
repo_root_style = "bold yellow"
repo_root_format = ' [´æá](bright-black) [$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)'

[fill]
symbol = " "

[status]
disabled = false
format = '[$symbol$status]($style) '
map_symbol = true
not_executable_symbol = "¯»í "
not_found_symbol = "¯¡Ä "
sigint_symbol = "¾░╣å "
signal_symbol = "´âº "
style = "red"
symbol = "¾░àÖ "

[cmd_duration]
format = "´ëô [$duration]($style) [ÔÇó](bright-black) "
