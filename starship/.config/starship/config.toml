# Starship nerd font compatible config

"$schema" = "https://starship.rs/config-schema.json"

add_newline = false

format = """
$os\
$username\
$hostname\
$directory\
${custom.giturl}\
$git_branch\
$git_commit\
$git_status\
( [ÔÇó](bright-black)$all)\
$fill\
$cmd_duration\
$time\
$line_break\
$character
"""

right_format = """
$status\
$shell\
$shlvl
"""

[os]
disabled = false
format = "[$symbol]($style)"
style = "15"

[os.symbols]
Alpine = "´îÇ"
Android = "´à╗"
Arch = "´îâ"
CentOS = "´îä"
Debian = "´îå"
Fedora = "´îè"
Kali = "´îº"
Linux = "´îÜ"
Macos = "´îé"
NixOS = "´îô"
Raspbian = "´îò"
RedHatEnterprise = "´îû"
Redhat = "´îû"
Ubuntu = "´îø"
Unknown = "´ê¡"
Windows = "¾░ì▓"

[username]
format = " [´æá](bright-black) [$user]($style)"
